<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHA: Alfabeto Mágico</title>
    <style>
        :root {
            --bg: #231f24;
            --accent: #896ab0;
            --gold: #9b8e6c;
            --text: #e3e0a4;
            --success: #a8b28a;
            --ivory: #f2efd9;
        }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif, Arial; 
            overflow: hidden; 
            touch-action: none;
            cursor: crosshair;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            pointer-events: none; 
            z-index: 100; 
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            background: rgba(35, 31, 36, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(5px);
        }

        .letter-guide { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 70vh; 
            color: rgba(155, 142, 108, 0.08); 
            user-select: none; 
            pointer-events: none;
            font-weight: 100;
            letter-spacing: -20px;
            font-variant-ligatures: none;
        }
        
        #status { color: var(--accent); font-size: 14px; font-family: 'Courier New', monospace; text-transform: uppercase; }
        
        .slider-container { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { -webkit-appearance: none; width: 150px; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--accent); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--ivory); cursor: pointer; margin-top: -7px; }

        #resetBtn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background-color: var(--ivory);
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 20px rgba(242, 239, 217, 0.3);
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            outline: none;
        }
        #resetBtn:active { transform: translateX(-50%) scale(0.9); }
        #resetBtn::after { content: '✨'; font-size: 24px; opacity: 0.6; }

        select { background: var(--bg); color: var(--text); border: 1px solid var(--accent); padding: 5px; border-radius: 4px; font-size: 11px; outline: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="color: var(--accent); margin: 0; font-size: 18px; letter-spacing: 2px;">VECTOR_MAGIC_V6</h1>
        <div id="status">TOCA PARA EMPEZAR</div>
    </div>
    
    <div id="controls">
        <div class="slider-container">
            <span class="slider-label" id="diffLabel">DIFICULTAD: NORMAL</span>
            <input type="range" id="diffSlider" min="40" max="180" value="100" step="5">
        </div>
        <select id="langSelect">
            <option value="es-MX">Español (MX)</option>
            <option value="en-US">English (US)</option>
            <option value="ja-JP">日本語</option>
        </select>
    </div>

    <button id="resetBtn"></button>
    <div class="letter-guide" id="guide">A</div>
    <canvas id="magicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        const resetBtn = document.getElementById('resetBtn');
        const diffSlider = document.getElementById('diffSlider');
        const diffLabel = document.getElementById('diffLabel');

        let drawing = false;
        let particles = [];
        let currentLetterIndex = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        let allStrokes = [];
        let currentStroke = [];
        
        // --- MOTOR DE COLISIÓN VECTORIAL ---
        let currentTargets = [];
        let hitCount = 0;
        let detectionThreshold = 100; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Definición de Esqueletos Vectoriales (Normalizados -1 a 1)
        const LetterSkeletons = {
            'A': [{x:0, y:-0.7}, {x:-0.5, y:0.7}, {x:0.5, y:0.7}, {x:0, y:0}],
            'B': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:-0.3}, {x:0.3, y:0.3}],
            'C': [{x:0.5, y:-0.5}, {x:-0.3, y:0}, {x:0.5, y:0.5}],
            'D': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.5, y:0}],
            'E': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:-0.7}, {x:0.3, y:0}, {x:0.3, y:0.7}],
            'F': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:-0.7}, {x:0.3, y:0}],
            'G': [{x:0.5, y:-0.5}, {x:-0.3, y:0}, {x:0.5, y:0.5}, {x:0.5, y:0}],
            'H': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.4, y:-0.7}, {x:0.4, y:0.7}, {x:0, y:0}],
            'I': [{x:0, y:-0.7}, {x:0, y:0.7}],
            'J': [{x:0.3, y:-0.7}, {x:0.3, y:0.4}, {x:-0.2, y:0.7}],
            'K': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0, y:0}, {x:0.4, y:-0.7}, {x:0.4, y:0.7}],
            'L': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:0.7}],
            'M': [{x:-0.5, y:0.7}, {x:-0.5, y:-0.7}, {x:0, y:0}, {x:0.5, y:-0.7}, {x:0.5, y:0.7}],
            'N': [{x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.4, y:0.7}, {x:0.4, y:-0.7}],
            'O': [{x:0, y:-0.7}, {x:-0.5, y:0}, {x:0, y:0.7}, {x:0.5, y:0}],
            'P': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:-0.3}],
            'Q': [{x:0, y:-0.7}, {x:0, y:0.7}, {x:0.5, y:0}, {x:-0.5, y:0}, {x:0.4, y:0.4}],
            'R': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.3, y:-0.3}, {x:0.4, y:0.7}],
            'S': [{x:0.4, y:-0.5}, {x:0, y:-0.7}, {x:-0.4, y:-0.3}, {x:0, y:0}, {x:0.4, y:0.3}, {x:0, y:0.7}, {x:-0.4, y:0.5}],
            'T': [{x:0, y:-0.7}, {x:0, y:0.7}, {x:-0.5, y:-0.7}, {x:0.5, y:-0.7}],
            'U': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.4}, {x:0, y:0.7}, {x:0.4, y:0.4}, {x:0.4, y:-0.7}],
            'V': [{x:-0.5, y:-0.7}, {x:0, y:0.7}, {x:0.5, y:-0.7}],
            'W': [{x:-0.5, y:-0.7}, {x:-0.3, y:0.7}, {x:0, y:-0.2}, {x:0.3, y:0.7}, {x:0.5, y:-0.7}],
            'X': [{x:-0.5, y:-0.7}, {x:0.5, y:0.7}, {x:0.5, y:-0.7}, {x:-0.5, y:0.7}],
            'Y': [{x:-0.5, y:-0.7}, {x:0, y:0}, {x:0.5, y:-0.7}, {x:0, y:0.7}],
            'Z': [{x:-0.5, y:-0.7}, {x:0.5, y:-0.7}, {x:-0.5, y:0.7}, {x:0.5, y:0.7}]
        };

        function initLetterTargets() {
            const letter = alphabet[currentLetterIndex];
            const skeleton = LetterSkeletons[letter] || [];
            const h = canvas.height;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = h * 0.45;

            currentTargets = skeleton.map(p => ({
                x: cx + p.x * scale,
                y: cy + p.y * scale,
                hit: false
            }));
            hitCount = 0;
        }

        class Particle {
            constructor(x, y, color, sizeMult = 1) {
                this.x = x; this.y = y;
                this.size = (Math.random() * 5 + 2) * sizeMult;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.01 + 0.01;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.fillStyle = this.color; ctx.globalAlpha = this.life;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        function speakLetter(letter) {
            const utterance = new SpeechSynthesisUtterance(letter);
            utterance.lang = langSelect.value;
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function checkCompletion(x, y) {
            currentTargets.forEach(t => {
                if (!t.hit) {
                    const dist = Math.hypot(x - t.x, y - t.y);
                    if (dist < detectionThreshold) {
                        t.hit = true;
                        hitCount++;
                        // Visual hint for hit
                        for(let i=0; i<5; i++) particles.push(new Particle(t.x, t.y, '#a8b28a', 0.5));
                    }
                }
            });

            if (hitCount >= currentTargets.length) {
                completeHechizo();
            }
        }

        function completeHechizo() {
            if (status.innerText.includes("✨")) return;
            const letter = alphabet[currentLetterIndex];
            status.innerText = `✨ HECHIZO: ${letter} ✨`;
            speakLetter(letter);

            for(let i=0; i<80; i++) {
                particles.push(new Particle(canvas.width/2 + (Math.random()-0.5)*400, canvas.height/2 + (Math.random()-0.5)*400, '#a8b28a', 2.5));
            }

            setTimeout(() => {
                currentLetterIndex = (currentLetterIndex + 1) % alphabet.length;
                resetState();
            }, 2500);
        }

        function resetState() {
            allStrokes = []; currentStroke = []; particles = [];
            guide.innerText = alphabet[currentLetterIndex];
            status.innerText = "DIBUJA LA LETRA";
            initLetterTargets();
        }

        function handleInput(e) {
            e.preventDefault();
            if (!drawing) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x === undefined || y === undefined) return;

            currentStroke.push({x, y});
            checkCompletion(x, y);

            if (Math.random() > 0.2) particles.push(new Particle(x, y, '#896ab0'));
            if (Math.random() > 0.8) particles.push(new Particle(x, y, '#f2efd9', 1.2));
        }

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.shadowBlur = 15; ctx.shadowColor = '#896ab0';
            ctx.strokeStyle = '#896ab0';
            ctx.lineWidth = 6;

            [...allStrokes, currentStroke].forEach(stroke => {
                if (stroke.length < 2) return;
                ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
                for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
                ctx.stroke();
            });

            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(drawEverything);
        }

        diffSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            // Higher slider = Harder = Smaller threshold
            detectionThreshold = 220 - val;
            let label = "NORMAL";
            if (val < 70) label = "FÁCIL";
            if (val > 140) label = "DIFÍCIL";
            diffLabel.innerText = `DIFICULTAD: ${label}`;
        });

        canvas.addEventListener('mousedown', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        canvas.addEventListener('touchstart', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, { passive: false });
        window.addEventListener('mouseup', () => { if (currentStroke.length > 0) allStrokes.push(currentStroke); drawing = false; });
        window.addEventListener('touchend', () => { if (currentStroke.length > 0) allStrokes.push(currentStroke); drawing = false; });

        resetBtn.addEventListener('click', () => {
            for(let i=0; i<30; i++) particles.push(new Particle(canvas.width/2, canvas.height-80, '#f2efd9', 2));
            resetState();
            status.innerText = "VOLVIENDO A EMPEZAR...";
        });

        initLetterTargets();
        drawEverything();
        window.addEventListener('click', () => { if (status.innerText === "TOCA PARA EMPEZAR") status.innerText = "DIBUJA LA LETRA"; }, {once: true});
    </script>
</body>
</html>
