<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHA: Alfabeto Mágico</title>
    <style>
        :root {
            --bg: #231f24;
            --accent: #896ab0;
            --gold: #9b8e6c;
            --text: #e3e0a4;
            --success: #a8b28a;
            --ivory: #f2efd9;
        }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif, Arial; 
            overflow: hidden; 
            touch-action: none;
            cursor: crosshair;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #ui { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            pointer-events: none; 
            z-index: 100; 
        }
        .letter-guide { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 70vh; 
            color: rgba(155, 142, 108, 0.08); 
            user-select: none; 
            pointer-events: none;
            font-weight: 100;
            letter-spacing: -20px;
            font-variant-ligatures: none;
        }
        #status { color: var(--accent); font-size: 14px; margin-top: 10px; font-family: 'Courier New', monospace; text-transform: uppercase; }
        
        /* Botón Mágico Marfil */
        #resetBtn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background-color: var(--ivory);
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 20px rgba(242, 239, 217, 0.3);
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #resetBtn:active {
            transform: translateX(-50%) scale(0.9);
            box-shadow: 0 0 40px rgba(242, 239, 217, 0.6);
        }
        #resetBtn::after {
            content: '✨';
            font-size: 24px;
            opacity: 0.6;
        }

        #settings {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }
        select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--accent);
            font-size: 12px;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="color: var(--accent); margin: 0; font-size: 18px; letter-spacing: 2px;">MAGIA_FONÉTICA_V4</h1>
        <div id="status">TOCA PARA EMPEZAR</div>
    </div>
    
    <div id="settings">
        <select id="langSelect">
            <option value="es-MX">Español (MX)</option>
            <option value="en-US">English (US)</option>
            <option value="ja-JP">日本語</option>
        </select>
    </div>

    <button id="resetBtn" title="Volver a empezar"></button>

    <div class="letter-guide" id="guide">A</div>
    <canvas id="magicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        const resetBtn = document.getElementById('resetBtn');

        let drawing = false;
        let particles = [];
        let currentLetterIndex = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        // Memoria de trazos para persistencia
        let allStrokes = [];
        let currentStroke = [];

        // Lógica de colisión mejorada
        let touchedPoints = new Set();
        const detectionThreshold = 80; // Sensibilidad de detección

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color, sizeMult = 1) {
                this.x = x; this.y = y;
                this.size = (Math.random() * 5 + 2) * sizeMult;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function speakLetter(letter) {
            const utterance = new SpeechSynthesisUtterance(letter);
            utterance.lang = langSelect.value;
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function getTargetZones() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const r = h * 0.25; // Radio aproximado de la letra
            
            return [
                { id: 1, x: cx - r, y: cy - r }, // Top Left
                { id: 2, x: cx + r, y: cy - r }, // Top Right
                { id: 3, x: cx - r, y: cy + r }, // Bottom Left
                { id: 4, x: cx + r, y: cy + r }, // Bottom Right
                { id: 5, x: cx,     y: cy     }  // Center
            ];
        }

        function checkCompletion(x, y) {
            const zones = getTargetZones();
            zones.forEach(z => {
                const dist = Math.hypot(x - z.x, y - z.y);
                if (dist < detectionThreshold) {
                    touchedPoints.add(z.id);
                }
            });

            // Si se tocan 3 de las 5 zonas críticas, avanzamos
            if (touchedPoints.size >= 3) {
                completeHechizo();
            }
        }

        function completeHechizo() {
            if (status.innerText.includes("ÉXITO")) return;
            
            const letter = alphabet[currentLetterIndex];
            status.innerText = `✨ ¡MAGIA! LETRA ${letter} ✨`;
            speakLetter(letter);

            // Explosión mágica masiva
            for(let i=0; i<100; i++) {
                particles.push(new Particle(canvas.width/2 + (Math.random()-0.5)*400, canvas.height/2 + (Math.random()-0.5)*400, '#a8b28a', 2));
            }

            setTimeout(() => {
                nextLetter();
            }, 2000);
        }

        function nextLetter() {
            currentLetterIndex = (currentLetterIndex + 1) % alphabet.length;
            resetCanvas();
            guide.innerText = alphabet[currentLetterIndex];
            status.innerText = "SIGUIENTE HECHIZO...";
        }

        function resetCanvas() {
            allStrokes = [];
            currentStroke = [];
            particles = [];
            touchedPoints.clear();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function handleInput(e) {
            e.preventDefault();
            if (!drawing) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (x === undefined || y === undefined) return;

            currentStroke.push({x, y});
            checkCompletion(x, y);

            // Partículas mágicas al trazar
            if (Math.random() > 0.2) particles.push(new Particle(x, y, '#896ab0'));
            if (Math.random() > 0.8) particles.push(new Particle(x, y, '#f2efd9', 1.2));
        }

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Dibujar trazos persistentes
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#896ab0';
            ctx.strokeStyle = '#896ab0';
            ctx.lineWidth = 5;

            [...allStrokes, currentStroke].forEach(stroke => {
                if (stroke.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(stroke[0].x, stroke[0].y);
                for (let i = 1; i < stroke.length; i++) {
                    ctx.lineTo(stroke[i].x, stroke[i].y);
                }
                ctx.stroke();
            });

            // 2. Dibujar partículas mágicas
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
            }

            requestAnimationFrame(drawEverything);
        }

        canvas.addEventListener('mousedown', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        canvas.addEventListener('touchstart', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, { passive: false });
        
        window.addEventListener('mouseup', () => { 
            if (currentStroke.length > 0) allStrokes.push(currentStroke);
            drawing = false; 
            currentStroke = []; 
        });
        window.addEventListener('touchend', () => { 
            if (currentStroke.length > 0) allStrokes.push(currentStroke);
            drawing = false; 
            currentStroke = []; 
        });

        resetBtn.addEventListener('click', () => {
            // Animación de reset
            for(let i=0; i<30; i++) particles.push(new Particle(canvas.width/2, canvas.height-80, '#f2efd9', 2));
            resetCanvas();
            status.innerText = "VOLVIENDO A EMPEZAR...";
        });

        drawEverything();

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') resetCanvas();
        });

        // Habilitar audio
        window.addEventListener('click', () => {
            if (status.innerText === "TOCA PARA EMPEZAR") {
                status.innerText = "DIBUJA LA LETRA";
            }
        }, {once: true});

    </script>
</body>
</html>
