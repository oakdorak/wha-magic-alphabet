<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WHA: Alfabeto Mágico</title>
    <style>
        :root {
            --bg: #231f24;
            --accent: #896ab0;
            --gold: #9b8e6c;
            --text: #e3e0a4;
            --success: #a8b28a;
            --ivory: #f2efd9;
        }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif, Arial; 
            overflow: hidden; 
            touch-action: none;
            cursor: crosshair;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; pointer-events: none; z-index: 100; }
        #controls {
            position: absolute; top: 20px; right: 20px; z-index: 101;
            background: rgba(35, 31, 36, 0.85); padding: 15px; border-radius: 12px;
            border: 1px solid var(--gold); display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Responsive Letter Guide */
        #letterContainer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vh; display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5;
        }
        .letter-guide { 
            font-size: min(75vh, 75vw);
            color: rgba(155, 142, 108, 0.08); 
            user-select: none; font-weight: 100;
            letter-spacing: -10px; font-variant-ligatures: none;
        }
        
        #status { color: var(--accent); font-size: 14px; font-family: 'Courier New', monospace; text-transform: uppercase; }
        
        .slider-container { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { -webkit-appearance: none; width: 150px; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--accent); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--ivory); cursor: pointer; margin-top: -7px; }

        #resetBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background-color: var(--ivory); border-radius: 50%;
            border: none; box-shadow: 0 0 25px rgba(242, 239, 217, 0.2);
            cursor: pointer; z-index: 101; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none;
        }
        #resetBtn:active { transform: translateX(-50%) scale(0.85); box-shadow: 0 0 40px var(--ivory); }
        #resetBtn::after { content: '✨'; font-size: 28px; opacity: 0.7; }

        select { background: var(--bg); color: var(--text); border: 1px solid var(--accent); padding: 5px; border-radius: 4px; font-size: 11px; outline: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="color: var(--accent); margin: 0; font-size: 18px; letter-spacing: 2px;">PATH_MAGIC_V7</h1>
        <div id="status">INICIAR SECUENCIA</div>
    </div>
    
    <div id="controls">
        <div class="slider-container">
            <span class="slider-label" id="diffLabel">DIFICULTAD: NORMAL</span>
            <input type="range" id="diffSlider" min="30" max="180" value="100" step="5">
        </div>
        <select id="langSelect">
            <option value="es-MX">Español (MX)</option>
            <option value="en-US">English (US)</option>
            <option value="ja-JP">日本語</option>
        </select>
    </div>

    <button id="resetBtn"></button>
    <div id="letterContainer">
        <div class="letter-guide" id="guide">A</div>
    </div>
    <canvas id="magicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        const resetBtn = document.getElementById('resetBtn');
        const diffSlider = document.getElementById('diffSlider');
        const diffLabel = document.getElementById('diffLabel');

        let drawing = false;
        let particles = [];
        let currentLetterIndex = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        let allStrokes = [];
        let currentStroke = [];
        
        // --- MOTOR DE SECUENCIA VECTORIAL V7 ---
        let currentTargets = [];
        let nextTargetIndex = 0;
        let detectionThreshold = 100; 
        let enforceSequence = true; // Solo en Difícil/Normal

        // Esqueletos con Orden de Trazo (Top-to-Bottom, Left-to-Right)
        const LetterSkeletons = {
            'A': [{x:0, y:-0.7}, {x:-0.4, y:0.7}, {x:0, y:-0.7}, {x:0.4, y:0.7}, {x:-0.2, y:0.1}, {x:0.2, y:0.1}],
            'B': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.3, y:-0.4}, {x:-0.4, y:0}, {x:0.3, y:0.4}, {x:-0.4, y:0.7}],
            'C': [{x:0.5, y:-0.5}, {x:0, y:-0.7}, {x:-0.4, y:0}, {x:0, y:0.7}, {x:0.5, y:0.5}],
            'D': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.5, y:0}, {x:-0.4, y:0.7}],
            'E': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.4, y:-0.7}, {x:-0.4, y:0}, {x:0.3, y:0}, {x:-0.4, y:0.7}, {x:0.4, y:0.7}],
            'F': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.4, y:-0.7}, {x:-0.4, y:0}, {x:0.3, y:0}],
            'G': [{x:0.5, y:-0.5}, {x:-0.4, y:0}, {x:0, y:0.7}, {x:0.5, y:0.3}, {x:0.2, y:0.3}],
            'H': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.4, y:-0.7}, {x:0.4, y:0.7}, {x:-0.4, y:0}, {x:0.4, y:0}],
            'I': [{x:0, y:-0.7}, {x:0, y:0.7}, {x:-0.3, y:-0.7}, {x:0.3, y:-0.7}, {x:-0.3, y:0.7}, {x:0.3, y:0.7}],
            'J': [{x:-0.3, y:-0.7}, {x:0.3, y:-0.7}, {x:0, y:-0.7}, {x:0, y:0.5}, {x:-0.3, y:0.7}],
            'K': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.4, y:-0.7}, {x:-0.4, y:0}, {x:0.4, y:0.7}],
            'L': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.4, y:0.7}],
            'M': [{x:-0.5, y:0.7}, {x:-0.5, y:-0.7}, {x:0, y:0}, {x:0.5, y:-0.7}, {x:0.5, y:0.7}],
            'N': [{x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.4, y:0.7}, {x:0.4, y:-0.7}],
            'O': [{x:0, y:-0.7}, {x:-0.5, y:0}, {x:0, y:0.7}, {x:0.5, y:0}, {x:0, y:-0.7}],
            'P': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.3, y:-0.3}, {x:-0.4, y:0}],
            'Q': [{x:0, y:-0.7}, {x:0, y:0.7}, {x:0.5, y:0}, {x:-0.5, y:0}, {x:0.2, y:0.2}, {x:0.5, y:0.6}],
            'R': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:-0.4, y:-0.7}, {x:0.3, y:-0.3}, {x:-0.4, y:0}, {x:0.4, y:0.7}],
            'S': [{x:0.4, y:-0.5}, {x:0, y:-0.7}, {x:-0.4, y:-0.3}, {x:0, y:0}, {x:0.4, y:0.3}, {x:0, y:0.7}, {x:-0.4, y:0.5}],
            'T': [{x:-0.5, y:-0.7}, {x:0.5, y:-0.7}, {x:0, y:-0.7}, {x:0, y:0.7}],
            'U': [{x:-0.4, y:-0.7}, {x:-0.4, y:0.4}, {x:0, y:0.7}, {x:0.4, y:0.4}, {x:0.4, y:-0.7}],
            'V': [{x:-0.5, y:-0.7}, {x:0, y:0.7}, {x:0.5, y:-0.7}],
            'W': [{x:-0.5, y:-0.7}, {x:-0.3, y:0.7}, {x:0, y:0.1}, {x:0.3, y:0.7}, {x:0.5, y:-0.7}],
            'X': [{x:-0.4, y:-0.7}, {x:0.4, y:0.7}, {x:0.4, y:-0.7}, {x:-0.4, y:0.7}],
            'Y': [{x:-0.4, y:-0.7}, {x:0, y:0}, {x:0.4, y:-0.7}, {x:0, y:0}, {x:0, y:0.7}],
            'Z': [{x:-0.4, y:-0.7}, {x:0.4, y:-0.7}, {x:-0.4, y:0.7}, {x:0.4, y:0.7}]
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initLetterTargets();
        }

        function initLetterTargets() {
            const letter = alphabet[currentLetterIndex];
            const skeleton = LetterSkeletons[letter] || [];
            const h = canvas.height;
            const w = canvas.width;
            const cx = w / 2;
            const cy = h / 2;
            
            // Recalcular escala basada en el contenedor visual real
            const scale = Math.min(h, w) * 0.45;

            currentTargets = skeleton.map((p, index) => ({
                x: cx + p.x * scale,
                y: cy + p.y * scale,
                hit: false,
                order: index
            }));
            nextTargetIndex = 0;
        }

        class Particle {
            constructor(x, y, color, sizeMult = 1) {
                this.x = x; this.y = y;
                this.size = (Math.random() * 5 + 2) * sizeMult;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.01 + 0.01;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.fillStyle = this.color; ctx.globalAlpha = this.life;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        let audioTimeout = null;
        function speakLetter(letter) {
            window.speechSynthesis.cancel(); // Detener cualquier audio previo
            const utterance = new SpeechSynthesisUtterance(letter);
            utterance.lang = langSelect.value;
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function checkCompletion(x, y) {
            // Detección Secuencial Responsable
            const target = currentTargets[nextTargetIndex];
            if (!target) return;

            const dist = Math.hypot(x - target.x, y - target.y);
            
            if (dist < detectionThreshold) {
                target.hit = true;
                nextTargetIndex++;
                // Feedback sutil de progreso
                for(let i=0; i<8; i++) particles.push(new Particle(target.x, target.y, '#a8b28a', 0.6));
                
                if (nextTargetIndex >= currentTargets.length) {
                    completeHechizo();
                }
            } else if (!enforceSequence) {
                // Modo Fácil: permitir tocar cualquier objetivo
                currentTargets.forEach((t, i) => {
                    if (!t.hit && Math.hypot(x - t.x, y - t.y) < detectionThreshold) {
                        t.hit = true;
                        // No incrementamos nextTargetIndex para no romper la lógica, 
                        // solo contamos cuántos hits llevamos.
                    }
                });
                const totalHits = currentTargets.filter(t => t.hit).length;
                if (totalHits >= currentTargets.length) completeHechizo();
            }
        }

        function completeHechizo() {
            if (status.innerText.includes("✨")) return;
            const letter = alphabet[currentLetterIndex];
            status.innerText = `✨ EXCELENTE: ${letter} ✨`;
            speakLetter(letter);

            // Explosión de éxito
            for(let i=0; i<120; i++) {
                particles.push(new Particle(canvas.width/2 + (Math.random()-0.5)*500, canvas.height/2 + (Math.random()-0.5)*500, '#a8b28a', 2.8));
            }

            audioTimeout = setTimeout(() => {
                currentLetterIndex = (currentLetterIndex + 1) % alphabet.length;
                resetState();
            }, 2500);
        }

        function resetState() {
            allStrokes = []; currentStroke = []; particles = [];
            guide.innerText = alphabet[currentLetterIndex];
            status.innerText = "SIGUE EL CAMINO";
            initLetterTargets();
        }

        function handleInput(e) {
            e.preventDefault();
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            if (x === undefined || y === undefined) return;

            currentStroke.push({x, y});
            checkCompletion(x, y);

            if (Math.random() > 0.25) particles.push(new Particle(x, y, '#896ab0'));
            if (Math.random() > 0.85) particles.push(new Particle(x, y, '#f2efd9', 1.3));
        }

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar Trazos con Glow Estabilizado
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(137, 106, 176, 0.5)';
            ctx.strokeStyle = '#896ab0';
            ctx.lineWidth = 7;

            const strokesToDraw = [...allStrokes];
            if (currentStroke.length > 0) strokesToDraw.push(currentStroke);

            strokesToDraw.forEach(stroke => {
                if (stroke.length < 2) return;
                ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
                for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
                ctx.stroke();
            });

            // Partículas
            ctx.shadowBlur = 0;
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(drawEverything);
        }

        diffSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            detectionThreshold = 220 - val;
            
            let label = "NORMAL";
            enforceSequence = true;
            if (val < 70) { label = "FÁCIL"; enforceSequence = false; }
            if (val > 140) label = "DIFÍCIL";
            
            diffLabel.innerText = `DIFICULTAD: ${label}`;
        });

        canvas.addEventListener('mousedown', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        canvas.addEventListener('touchstart', (e) => { drawing = true; currentStroke = []; handleInput(e); });
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, { passive: false });
        
        const endDrawing = () => { 
            if (currentStroke.length > 0) allStrokes.push(currentStroke); 
            drawing = false; currentStroke = []; 
        };
        window.addEventListener('mouseup', endDrawing);
        window.addEventListener('touchend', endDrawing);

        resetBtn.addEventListener('click', () => {
            clearTimeout(audioTimeout);
            window.speechSynthesis.cancel();
            resetState();
            status.innerText = "MAGIA REINICIADA";
            for(let i=0; i<40; i++) particles.push(new Particle(canvas.width/2, canvas.height-80, '#f2efd9', 2.5));
        });

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', resize);

        resize();
        drawEverything();
        window.addEventListener('click', () => { if (status.innerText === "INICIAR SECUENCIA") status.innerText = "SIGUE EL CAMINO"; }, {once: true});
    </script>
</body>
</html>
